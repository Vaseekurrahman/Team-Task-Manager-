<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base :: layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<section>
<div class="main-content">

    <div class="card-box">

        <h3 class="section-title mb-4">
            <i class="bi bi-people-fill"></i> Team Members
        </h3>

        <div class="table-responsive">
            <table class="table custom-table align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.name}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:if="${u.role.name() == 'ADMIN'}" class="badge-role admin">ADMIN</span>
                        <span th:if="${u.role.name() == 'MEMBER'}" class="badge-role member">MEMBER</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/delete-user/' + ${u.id}}"
                           class="btn btn-sm btn-danger btn-custom"
                           onclick="return confirm('Delete this user?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
</section>
</body>
</html>
