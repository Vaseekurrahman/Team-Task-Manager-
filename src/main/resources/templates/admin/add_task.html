<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base :: layout(~{::section})}">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Task | Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">



</head>

<body>

<section>
    <div class="container page-wrapper">

        <div class="row justify-content-center">

            <div class="col-xl-11">

                <div class="card main-card">

                    <div class="row g-0">

                        <!-- LEFT SIDE -->

                        <div class="col-lg-4">

                            <div class="left-panel">

                                <div class="logo-box">
                                    <i class="bi bi-kanban-fill"></i>
                                </div>

                                <h2>Create New Task</h2>

                                <p>
                                    Manage team workflow efficiently,
                                    assign projects and monitor progress
                                    using your professional dashboard.
                                </p>

                                <div class="feature-card">

                                    <i class="bi bi-lightning-charge-fill"></i>

                                    <span>
                                    Fast Task Assignment
                                </span>

                                </div>

                                <div class="feature-card">

                                    <i class="bi bi-calendar-check-fill"></i>

                                    <span>
                                    Deadline Tracking
                                </span>

                                </div>

                                <div class="feature-card">

                                    <i class="bi bi-people-fill"></i>

                                    <span>
                                    Team Collaboration
                                </span>

                                </div>

                                <div class="feature-card">

                                    <i class="bi bi-bar-chart-fill"></i>

                                    <span>
                                    Progress Monitoring
                                </span>

                                </div>

                            </div>

                        </div>

                        <!-- RIGHT SIDE -->

                        <div class="col-lg-8">

                            <div class="right-panel">

                                <h2 class="page-title">
                                    Add Task
                                </h2>

                                <p class="page-subtitle">
                                    Fill task details and assign it to your team member.
                                </p>

                                <form th:action="@{/admin/save-task}"
                                      method="post">

                                    <!-- TASK TITLE -->

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Task Title
                                        </label>

                                        <div class="input-group input-group-custom">

                                        <span class="input-group-text">
                                            <i class="bi bi-pencil-square"></i>
                                        </span>

                                            <input type="text"
                                                   name="title"
                                                   class="form-control"
                                                   placeholder="Enter task title"
                                                   required>

                                        </div>

                                    </div>

                                    <!-- DESCRIPTION -->

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Description
                                        </label>

                                        <textarea name="description"
                                                  rows="4"
                                                  class="form-control"
                                                  placeholder="Write task description..."
                                                  required></textarea>

                                    </div>

                                    <div class="row">

                                        <!-- DATE -->

                                        <div class="col-md-6 mb-3">

                                            <label class="form-label">
                                                Due Date
                                            </label>

                                            <input type="date"
                                                   name="dueDate"
                                                   class="form-control"
                                                   required>

                                        </div>

                                        <!-- PROJECT -->

                                        <div class="col-md-6 mb-3">

                                            <label class="form-label">
                                                Select Project
                                            </label>

                                            <select name="project.id"
                                                    class="form-select"
                                                    required>

                                                <option value="">
                                                    -- Select Project --
                                                </option>

                                                <option th:each="p : ${projects}"
                                                        th:value="${p.id}"
                                                        th:text="${p.projectName}">
                                                </option>

                                            </select>

                                        </div>

                                    </div>

                                    <!-- USER -->

                                    <div class="mb-4">

                                        <label class="form-label">
                                            Assign Team Member
                                        </label>

                                        <select name="assignedUser.id"
                                                class="form-select"
                                                required>

                                            <option value="">
                                                -- Select Member --
                                            </option>

                                            <option th:each="u : ${users}"
                                                    th:value="${u.id}"
                                                    th:text="${u.name}">
                                            </option>

                                        </select>

                                    </div>

                                    <!-- BUTTONS -->

                                    <div class="d-flex gap-3 flex-wrap">

                                        <button type="submit"
                                                class="btn btn-primary btn-save flex-grow-1">

                                            <i class="bi bi-plus-circle me-1"></i>
                                            Create Task

                                        </button>

                                        <a th:href="@{/admin/admin_dashboard}"
                                           class="btn btn-outline-secondary btn-back flex-grow-1">

                                            <i class="bi bi-arrow-left me-1"></i>
                                            Back Dashboard

                                        </a>

                                    </div>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</section>

</body>

</html>
