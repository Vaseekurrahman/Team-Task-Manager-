<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Add Task - Team Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .card{
            border:none;
            border-radius:15px;
            margin-top:50px;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Add New Task</h3>

                <form th:action="@{/admin/save-task}" method="post">

                    <!-- Task Title -->
                    <div class="mb-3">
                        <label class="form-label">Task Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Enter task title" required>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Enter description"></textarea>
                    </div>

                    <!-- Project Select -->
                    <div class="mb-3">
                        <label class="form-label">Select Project</label>
                        <select name="project.id" class="form-control" required>

                            <option value="">-- Select Project --</option>

                            <option th:each="p : ${projects}"
                                    th:value="${p.id}"
                                    th:text="${p.projectName}">
                            </option>

                        </select>
                    </div>

                    <!-- Assign User -->
                    <div class="mb-3">
                        <label class="form-label">Assign To</label>
                        <select name="assignedUser.id" class="form-control" required>

                            <option value="">-- Select User --</option>

                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.name}">
                            </option>

                        </select>
                    </div>

                    <!-- Due Date -->
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" name="dueDate" class="form-control">
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary w-100">
                        Save Task
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
