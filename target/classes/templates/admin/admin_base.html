<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- Mobile Top Bar -->
<div class="mobile-topbar">
    <button class="hamburger-btn" id="sidebarToggle" aria-label="Open menu">
        <i class="bi bi-list"></i>
    </button>
    <span class="mobile-brand">
        <i class="bi bi-kanban-fill"></i> TeamTask
    </span>
    <span style="width:40px;"></span>
</div>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="brand-logo">
            <i class="bi bi-kanban-fill"></i>
            TeamTask
        </div>

        <a class="active" th:href="@{/admin/admin_dashboard}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a th:href="@{/admin/add_project}">
            <i class="bi bi-folder-fill"></i> Projects
        </a>

        <a th:href="@{/admin/add_task}">
            <i class="bi bi-list-task"></i> Tasks
        </a>

        <a th:href="@{/admin/team}">
            <i class="bi bi-people-fill"></i> Team
        </a>

        <a th:href="@{/user/logout}">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </aside>

    <!-- Right Side -->
    <div class="content-wrapper">

        <!-- Main Content -->
        <main class="main-content">
            <div th:replace="${content}"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            © 2026 Team Task Manager | All Rights Reserved
        </footer>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');

    function openSidebar(){
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }

    function closeSidebar(){
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }

    toggleBtn.addEventListener('click', function(){
        sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });

    overlay.addEventListener('click', closeSidebar);

    // Close sidebar when a nav link is clicked on mobile
    sidebar.querySelectorAll('a').forEach(function(link){
        link.addEventListener('click', function(){
            if(window.innerWidth < 992) closeSidebar();
        });
    });
</script>

</body>
</html>
