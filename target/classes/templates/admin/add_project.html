<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base :: layout(~{::section})}">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Project | Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">



</head>

<body>
<section>
    <div class="topbar">

        <div class="container d-flex justify-content-between align-items-center">

            <a th:href="@{/admin/admin_dashboard}"
               class="brand-logo">

                <i class="bi bi-kanban-fill"></i>
                TeamTaskManager

            </a>

            <a th:href="@{/admin/admin_dashboard}"
               class="btn btn-outline-primary btn-back">

                <i class="bi bi-arrow-left"></i>
                Back Dashboard

            </a>

        </div>

    </div>


    <!-- Main Section -->
    <div class="container py-5">

        <div class="row justify-content-center align-items-center">

            <div class="col-xl-6 col-lg-7 col-md-9">

                <div class="card project-card">

                    <!-- Header -->
                    <div class="card-header-custom">

                        <div class="icon-box mb-3">
                            <i class="bi bi-folder-plus"></i>
                        </div>

                        <h2>Add New Project</h2>

                        <p>
                            Create and manage your team projects efficiently
                        </p>

                    </div>

                    <!-- Form -->
                    <div class="form-section">

                        <form th:action="@{/admin/save-project}"
                              method="post">

                            <!-- Project Name -->
                            <div class="mb-4">

                                <label class="form-label">
                                    <i class="bi bi-folder2-open"></i>
                                    Project Name
                                </label>

                                <input type="text"
                                       name="projectName"
                                       class="form-control"
                                       placeholder="Enter project name"
                                       required>

                            </div>

                            <!-- Description -->
                            <div class="mb-4">

                                <label class="form-label">
                                    <i class="bi bi-card-text"></i>
                                    Description
                                </label>

                                <textarea name="description"
                                          class="form-control"
                                          rows="5"
                                          placeholder="Write project description..."></textarea>

                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid mt-4">

                                <button type="submit"
                                        class="btn btn-primary btn-save">

                                    <i class="bi bi-check-circle"></i>
                                    Save Project

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
</section>
<!-- Top Navbar -->


</body>

</html>
