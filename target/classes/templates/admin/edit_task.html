<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/admin_base :: layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task | Team Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<section>
<div class="container page-wrapper">
    <div class="row justify-content-center">
        <div class="col-xl-7 col-lg-8 col-md-10">

            <div class="project-card">

                <!-- Header -->
                <div class="card-header-custom">
                    <div class="icon-box mb-3">
                        <i class="bi bi-pencil-square"></i>
                    </div>
                    <h2>Edit Task</h2>
                    <p>Update task details below</p>
                </div>

                <!-- Form -->
                <div class="form-section">

                    <form th:action="@{/admin/update-task}" th:object="${task}" method="post">

                        <!-- Hidden ID -->
                        <input type="hidden" th:field="*{id}">

                        <!-- TITLE -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-pencil"></i> Task Title
                            </label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-card-text"></i> Description
                            </label>
                            <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="row">
                            <!-- STATUS -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="bi bi-activity"></i> Status
                                </label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="TODO">TODO</option>
                                    <option value="IN_PROGRESS">IN PROGRESS</option>
                                    <option value="DONE">DONE</option>
                                </select>
                            </div>

                            <!-- DUE DATE -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="bi bi-calendar"></i> Due Date
                                </label>
                                <input type="date" th:field="*{dueDate}" class="form-control">
                            </div>
                        </div>

                        <!-- PROJECT -->
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-folder"></i> Project
                            </label>
                            <select th:field="*{project.id}" class="form-select">
                                <option th:each="p : ${projects}"
                                        th:value="${p.id}"
                                        th:text="${p.projectName}">
                                </option>
                            </select>
                        </div>

                        <!-- USER -->
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-person"></i> Assign User
                            </label>
                            <select th:field="*{assignedUser.id}" class="form-select">
                                <option th:each="u : ${users}"
                                        th:value="${u.id}"
                                        th:text="${u.name}">
                                </option>
                            </select>
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-flex gap-3 flex-wrap">
                            <button type="submit" class="btn btn-primary btn-save flex-grow-1">
                                <i class="bi bi-check-circle me-1"></i> Update Task
                            </button>
                            <a th:href="@{/admin/admin_dashboard}"
                               class="btn btn-outline-secondary btn-back flex-grow-1">
                                <i class="bi bi-arrow-left me-1"></i> Cancel
                            </a>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
</div>
</section>
</body>
</html>
