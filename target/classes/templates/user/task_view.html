<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Details | Team Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #f4f7fc;
        }

        /* Navbar */

        .navbar-custom{
            background: linear-gradient(90deg,#4f46e5,#7c3aed);
            padding: 14px 0;
        }

        .navbar-brand{
            color: white !important;
            font-size: 24px;
            font-weight: 700;
        }

        /* Main Card */

        .task-container{
            padding: 50px 0;
        }

        .task-card{
            border: none;
            border-radius: 22px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .task-header{
            background: linear-gradient(90deg,#4f46e5,#7c3aed);
            color: white;
            padding: 30px;
        }

        .task-header h2{
            font-weight: 700;
            margin-bottom: 8px;
        }

        .task-header p{
            margin: 0;
            opacity: 0.9;
        }

        .task-body{
            padding: 35px;
        }

        .detail-card{
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            height: 100%;
            transition: 0.3s;
        }

        .detail-card:hover{
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .detail-label{
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .detail-value{
            font-size: 17px;
            font-weight: 500;
            color: #111827;
            word-break: break-word;
        }

        .status-badge{
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-custom{
            border-radius: 12px;
            padding: 11px 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover{
            transform: translateY(-2px);
        }

        .btn-start{
            background: #facc15;
            border: none;
            color: black;
        }

        .btn-done{
            background: linear-gradient(90deg,#10b981,#059669);
            border: none;
            color: white;
        }

        .btn-back{
            border: 1px solid #d1d5db;
            background: white;
        }

        .complete-box{
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            padding: 15px;
            border-radius: 14px;
            margin-top: 20px;
        }

        .complete-box i{
            color: #059669;
        }

        @media(max-width:768px){

            .task-body{
                padding: 22px;
            }

            .task-header{
                padding: 24px;
            }

            .task-header h2{
                font-size: 24px;
            }

            .button-group{
                flex-direction: column;
            }

            .button-group a{
                width: 100%;
            }
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-custom shadow">

    <div class="container">

        <a class="navbar-brand"
           th:href="@{/user/user_dashboard}">

            <i class="bi bi-kanban-fill"></i>
            TeamTaskManager

        </a>

    </div>

</nav>

<!-- Main Section -->

<div class="container task-container">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="task-card">

                <!-- Header -->

                <div class="task-header">

                    <h2>
                        <i class="bi bi-list-check"></i>
                        Task Details
                    </h2>

                    <p>
                        View complete task information and update status.
                    </p>

                </div>

                <!-- Body -->

                <div class="task-body">

                    <div class="row g-4">

                        <!-- Title -->

                        <div class="col-md-6">

                            <div class="detail-card">

                                <div class="detail-label">
                                    Task Title
                                </div>

                                <div class="detail-value"
                                     th:text="${task.title}">
                                </div>

                            </div>

                        </div>

                        <!-- Project -->

                        <div class="col-md-6">

                            <div class="detail-card">

                                <div class="detail-label">
                                    Project Name
                                </div>

                                <div class="detail-value"
                                     th:text="${task.project != null ? task.project.projectName : 'N/A'}">
                                </div>

                            </div>

                        </div>

                        <!-- Description -->

                        <div class="col-12">

                            <div class="detail-card">

                                <div class="detail-label">
                                    Description
                                </div>

                                <div class="detail-value text-secondary"
                                     th:text="${task.description}">
                                </div>

                            </div>

                        </div>

                        <!-- Due Date -->

                        <div class="col-md-6">

                            <div class="detail-card">

                                <div class="detail-label">
                                    Due Date
                                </div>

                                <div class="detail-value"
                                     th:text="${task.dueDate}">
                                </div>

                            </div>

                        </div>

                        <!-- Status -->

                        <div class="col-md-6">

                            <div class="detail-card">

                                <div class="detail-label">
                                    Current Status
                                </div>

                                <span class="status-badge"
                                      th:classappend="${task.status.name() == 'DONE'} ? 'bg-success text-white' :
                                      (${task.status.name() == 'IN_PROGRESS'} ? 'bg-warning text-dark' :
                                      'bg-secondary text-white')"
                                      th:text="${task.status}">
                                </span>

                            </div>

                        </div>

                    </div>

                    <!-- Completed -->

                    <div th:if="${task.completedAt != null}"
                         class="complete-box">

                        <i class="bi bi-check-circle-fill"></i>

                        <span class="fw-semibold ms-2">
                            Completed At :
                        </span>

                        <span th:text="${task.completedAt}"></span>

                    </div>

                    <!-- Buttons -->

                    <div class="d-flex gap-3 mt-4 flex-wrap button-group">

                        <a th:href="@{'/user/task/update/' + ${task.id} + '?status=IN_PROGRESS'}"
                           class="btn btn-custom btn-start">

                            <i class="bi bi-play-fill"></i>
                            Start Task

                        </a>

                        <a th:href="@{'/user/task/update/' + ${task.id} + '?status=DONE'}"
                           class="btn btn-custom btn-done">

                            <i class="bi bi-check-lg"></i>
                            Mark Done

                        </a>

                        <a th:href="@{/user/user_dashboard}"
                           class="btn btn-custom btn-back">

                            <i class="bi bi-arrow-left"></i>
                            Back

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
